# alembic.ini — KIRA DB 마이그레이션 설정
# 실제 접속 URL은 env.py가 환경변수 DATABASE_URL로 덮어쓴다(아래 값은 더미).
[alembic]
script_location = alembic
prepend_sys_path = .
# 리비전 파일명: 0001_slug 형태
file_template = %%(rev)s_%%(slug)s
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
