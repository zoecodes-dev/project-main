services:
  # Layer 1: 공급망 데이터 백본 (PostgreSQL + PostGIS + pgvector)
  db:
    platform: linux/amd64
    build:
      context: .
      dockerfile: db.Dockerfile
    container_name: kira-postgres
    networks:
      - project_net
    env_file:
      - ./.env
    ports:
      - "5433:5432"
    volumes:
      - kira_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-kira_admin} -d $${POSTGRES_DB:-kira_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # Async Workflow Queue용 Redis
  redis:
    platform: linux/amd64
    build:
      context: .
      dockerfile: redis.Dockerfile
    container_name: kira-redis
    networks:
      - project_net
    ports:
      - "6380:6379"
    volumes:
      - kira_redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # Layer 2: KIRA 에이전트 통합 백엔드
  app:
    platform: linux/amd64
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: kira-backend
    networks:
      - project_net
    env_file:
      - ./.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  kira_pgdata:
    name: kira_pgdata
  kira_redisdata:
    name: kira_redisdata

networks:
  project_net:
    driver: bridge