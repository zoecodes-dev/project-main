# KIRA 리버스 프록시 설정 (HTTP 80번 — 오늘 시연/테스트용)
# HTTPS는 나중에 도메인 확보 후 server 블록에 443 + ssl_certificate 추가하면 됨.

server {
    listen 80;
    server_name _;   # 도메인 없이 IP로 받음. 도메인 생기면 여기에 기입.

    # [502 방지] Docker 내장 DNS(127.0.0.11)로 upstream을 '요청 시' 재해석한다.
    #   기존 upstream{server app:8000;}는 기동 시 1회만 DNS 해석 후 IP를 고정 → app 컨테이너
    #   재생성(up --build 시 새 IP) 때 옛 IP를 물어 502. proxy_pass에 변수를 쓰면 nginx가
    #   resolver로 매 요청 해석(valid TTL 캐시)하므로 nginx 재기동 없이 새 IP를 따라간다.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── gzip 압축 (아웃바운드 트래픽 비용 절감 카드) ──
    gzip on;
    gzip_vary on;                 # 캐시/프록시가 압축 버전 구분
    gzip_min_length 1024;         # 1KB 미만은 압축 안 함 (오버헤드 방지)
    gzip_comp_level 5;            # 1~9 중 균형점 (높을수록 더 압축, CPU 더 씀)
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml
        image/svg+xml;
    # 주: 이미 압축된 포맷(jpg, png, zip)은 재압축 의미 없어 제외.

    # ── 요청 크기 (문서/엑셀 업로드 대비) ──
    client_max_body_size 50M;

    # ── app으로 전달 ──
    location / {
        set $kira_app app:8000;          # 변수 사용 → resolver로 요청 시 재해석(502 방지)
        proxy_pass http://$kira_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 에이전트 파이프라인 등 긴 작업 대비 타임아웃 여유
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ── 헬스체크용 (선택) ──
    location /health {
        set $kira_app_h app:8000;
        proxy_pass http://$kira_app_h;   # 원 요청 URI(/health) 그대로 전달
        access_log off;
    }
}
